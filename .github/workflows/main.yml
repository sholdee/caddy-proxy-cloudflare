name: CI

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "healthcheck.go"
      - ".github/workflows/main.yml"
      - "renovate.json5"
      - "scripts/*.sh"
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      binary: ${{ steps.filter.outputs.binary }}
      build: ${{ steps.filter.outputs.build }}
      renovate: ${{ steps.filter.outputs.renovate }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            build:
              - "Dockerfile"
              - "healthcheck.go"
              - "healthcheck_test.go"
            binary:
              - "Dockerfile"
              - "healthcheck.go"
              - "healthcheck_test.go"
              - ".github/workflows/main.yml"
              - "examples/Caddyfile*"
              - "scripts/smoke-binary.sh"
            renovate:
              - ".github/workflows/main.yml"
              - "renovate.json5"

  actionlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
        with:
          args: -shellcheck=shellcheck .github/workflows/main.yml

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run ShellCheck
        shell: bash
        run: |
          set -euo pipefail

          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace:ro" \
            -w /workspace \
            docker.io/koalaman/shellcheck:v0.11.0@sha256:61862eba1fcf09a484ebcc6feea46f1782532571a34ed51fedf90dd25f925a8d \
            scripts/*.sh

  buildx:
    runs-on: ubuntu-latest
    needs: detect
    if: github.event_name == 'pull_request' && needs.detect.outputs.build == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Verify distroless base image
        shell: bash
        run: |
          set -euo pipefail

          DISTROLESS_REF=$(awk '/^FROM gcr\.io\/distroless\// {print $2; exit}' Dockerfile)
          if [[ -z "${DISTROLESS_REF}" ]]; then
            echo "No distroless base image found in Dockerfile" >&2
            exit 1
          fi

          echo "Verifying ${DISTROLESS_REF}"
          cosign verify "${DISTROLESS_REF}" \
            --certificate-oidc-issuer https://accounts.google.com \
            --certificate-identity keyless@distroless.iam.gserviceaccount.com

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          tags: |
            sholdee/caddy-proxy-cloudflare:ci
          cache-from: type=gha,scope=caddy-proxy-cloudflare
          cache-to: type=gha,scope=caddy-proxy-cloudflare,mode=max,ignore-error=true

  binary-check:
    runs-on: ubuntu-latest
    needs: detect
    if: github.event_name == 'pull_request' && needs.detect.outputs.binary == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Export binaries
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          target: binary-export
          platforms: linux/amd64,linux/arm64
          outputs: type=local,dest=dist-raw
          cache-from: type=gha,scope=caddy-proxy-cloudflare
          cache-to: type=gha,scope=caddy-proxy-cloudflare,mode=max,ignore-error=true

      - name: Validate binary artifacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          for arch in amd64 arm64; do
            src="$(find dist-raw -type f -name "caddy-proxy-cloudflare-linux-${arch}" -print -quit)"
            if [[ -z "${src}" ]]; then
              echo "Missing binary for linux/${arch}" >&2
              find dist-raw -maxdepth 4 -type f -print >&2
              exit 1
            fi
            cp "${src}" "dist/caddy-proxy-cloudflare-linux-${arch}"
          done

          chmod 0755 dist/caddy-proxy-cloudflare-linux-*
          cd dist
          sha256sum caddy-proxy-cloudflare-linux-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Smoke binary artifacts
        env:
          CADDY_PROXY_SMOKE_REQUIRE_EXEC: "1"
        run: scripts/smoke-binary.sh dist

  release-meta:
    runs-on: ubuntu-latest
    needs:
      - detect
      - actionlint
      - shellcheck
    if: github.event_name == 'push' && needs.detect.outputs.build == 'true'
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Create release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          read -r YEAR MONTH DAY HOUR MINUTE SECOND < <(date -u '+%Y %m %d %H %M %S')
          MDD=$((10#${MONTH} * 100 + 10#${DAY}))
          HMMSS=$((10#${HOUR} * 10000 + 10#${MINUTE} * 100 + 10#${SECOND}))
          TAG="v${YEAR}.${MDD}.${HMMSS}"
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

          git tag "${TAG}" "${GITHUB_SHA}"
          git push origin "refs/tags/${TAG}"

  publish-image:
    runs-on: ubuntu-latest
    needs:
      - detect
      - release-meta
    if: github.event_name == 'push' && needs.detect.outputs.build == 'true'
    permissions:
      contents: read
      id-token: write
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Verify distroless base image
        shell: bash
        run: |
          set -euo pipefail

          DISTROLESS_REF=$(awk '/^FROM gcr\.io\/distroless\// {print $2; exit}' Dockerfile)
          if [[ -z "${DISTROLESS_REF}" ]]; then
            echo "No distroless base image found in Dockerfile" >&2
            exit 1
          fi

          echo "Verifying ${DISTROLESS_REF}"
          cosign verify "${DISTROLESS_REF}" \
            --certificate-oidc-issuer https://accounts.google.com \
            --certificate-identity keyless@distroless.iam.gserviceaccount.com

      - name: Docker Login to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push images
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            sholdee/caddy-proxy-cloudflare:latest
            sholdee/caddy-proxy-cloudflare:${{ needs.release-meta.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/caddy-proxy-cloudflare:latest
            ghcr.io/${{ github.repository_owner }}/caddy-proxy-cloudflare:${{ needs.release-meta.outputs.tag }}
          cache-from: type=gha,scope=caddy-proxy-cloudflare
          cache-to: type=gha,scope=caddy-proxy-cloudflare,mode=max,ignore-error=true

      - name: Sign image digests
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          DOCKERHUB_IMAGE: docker.io/sholdee/caddy-proxy-cloudflare
          GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/caddy-proxy-cloudflare
        shell: bash
        run: |
          set -euo pipefail

          for image in "${DOCKERHUB_IMAGE}" "${GHCR_IMAGE}"; do
            echo "Signing ${image}@${DIGEST}"
            cosign sign --yes "${image}@${DIGEST}"
          done

  binaries:
    runs-on: ubuntu-latest
    needs:
      - detect
      - release-meta
    if: github.event_name == 'push' && needs.detect.outputs.build == 'true'
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Export binaries
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          target: binary-export
          platforms: linux/amd64,linux/arm64
          outputs: type=local,dest=dist-raw
          cache-from: type=gha,scope=caddy-proxy-cloudflare
          cache-to: type=gha,scope=caddy-proxy-cloudflare,mode=max,ignore-error=true

      - name: Prepare binary artifacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          for arch in amd64 arm64; do
            src="$(find dist-raw -type f -name "caddy-proxy-cloudflare-linux-${arch}" -print -quit)"
            if [[ -z "${src}" ]]; then
              echo "Missing binary for linux/${arch}" >&2
              find dist-raw -maxdepth 4 -type f -print >&2
              exit 1
            fi
            cp "${src}" "dist/caddy-proxy-cloudflare-linux-${arch}"
          done

          chmod 0755 dist/caddy-proxy-cloudflare-linux-*
          cd dist
          sha256sum caddy-proxy-cloudflare-linux-* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Smoke binary artifacts
        env:
          CADDY_PROXY_SMOKE_REQUIRE_EXEC: "1"
        run: scripts/smoke-binary.sh dist

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign checksum manifest
        run: |
          cosign sign-blob --yes \
            --bundle dist/checksums-sha256.txt.sigstore.json \
            dist/checksums-sha256.txt

      - name: Attest binaries
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-checksums: dist/checksums-sha256.txt

      - name: Upload binary artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries
          path: dist/
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs:
      - detect
      - release-meta
      - publish-image
      - binaries
    if: github.event_name == 'push' && needs.detect.outputs.build == 'true'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Download binary artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: binaries
          path: dist

      - name: Verify downloaded binary artifacts
        shell: bash
        env:
          CADDY_PROXY_SMOKE_REQUIRE_EXEC: "1"
        run: |
          set -euo pipefail

          test -f dist/checksums-sha256.txt.sigstore.json
          chmod 0755 dist/caddy-proxy-cloudflare-linux-*
          scripts/smoke-binary.sh dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_DIGEST: ${{ needs.publish-image.outputs.digest }}
          TAG: ${{ needs.release-meta.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          generated_notes="$(
            gh api \
              "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="${TAG}" \
              -f target_commitish="${GITHUB_SHA}" \
              --jq .body
          )"

          artifact_notes="$(cat <<EOF
          **GHCR image:** \`ghcr.io/${GITHUB_REPOSITORY_OWNER}/caddy-proxy-cloudflare:${TAG}@${IMAGE_DIGEST}\`
          **Docker Hub image:** \`docker.io/sholdee/caddy-proxy-cloudflare:${TAG}@${IMAGE_DIGEST}\`
          **Checksums:** \`checksums-sha256.txt\` (Sigstore bundle: \`checksums-sha256.txt.sigstore.json\`)
          **Binaries:** \`caddy-proxy-cloudflare-linux-amd64\`, \`caddy-proxy-cloudflare-linux-arm64\`
          EOF
          )"

          release_notes="${generated_notes}

          ---

          ${artifact_notes}"

          gh release create "${TAG}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${TAG}" \
            --notes "${release_notes}" \
            --verify-tag \
            --latest

  renovate:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.renovate == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate Renovate config
        run: npx --yes --package renovate@43.214.5 -- renovate-config-validator --strict

  gate:
    runs-on: ubuntu-latest
    needs:
      - detect
      - actionlint
      - shellcheck
      - binary-check
      - buildx
      - release-meta
      - publish-image
      - binaries
      - release
      - renovate
    if: always()
    steps:
      - name: Check required job results
        env:
          ACTIONLINT_RESULT: ${{ needs.actionlint.result }}
          BINARY_CHECK_RESULT: ${{ needs.binary-check.result }}
          BINARIES_RESULT: ${{ needs.binaries.result }}
          BUILDX_RESULT: ${{ needs.buildx.result }}
          DETECT_RESULT: ${{ needs.detect.result }}
          PUBLISH_IMAGE_RESULT: ${{ needs.publish-image.result }}
          RELEASE_META_RESULT: ${{ needs.release-meta.result }}
          RELEASE_RESULT: ${{ needs.release.result }}
          RENOVATE_RESULT: ${{ needs.renovate.result }}
          SHELLCHECK_RESULT: ${{ needs.shellcheck.result }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${DETECT_RESULT}" != "success" ]]; then
            echo "detect failed with result: ${DETECT_RESULT}" >&2
            exit 1
          fi

          if [[ "${ACTIONLINT_RESULT}" != "success" ]]; then
            echo "actionlint failed with result: ${ACTIONLINT_RESULT}" >&2
            exit 1
          fi

          if [[ "${SHELLCHECK_RESULT}" != "success" ]]; then
            echo "shellcheck failed with result: ${SHELLCHECK_RESULT}" >&2
            exit 1
          fi

          check_optional_job() {
            local job="$1"
            local result="$2"

            case "${result}" in
              success|skipped)
                ;;
              *)
                echo "${job} failed with result: ${result}" >&2
                exit 1
                ;;
            esac
          }

          check_optional_job binary-check "${BINARY_CHECK_RESULT}"
          check_optional_job binaries "${BINARIES_RESULT}"
          check_optional_job buildx "${BUILDX_RESULT}"
          check_optional_job release-meta "${RELEASE_META_RESULT}"
          check_optional_job publish-image "${PUBLISH_IMAGE_RESULT}"
          check_optional_job release "${RELEASE_RESULT}"
          check_optional_job renovate "${RENOVATE_RESULT}"
