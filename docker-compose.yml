---
# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-go/refs/heads/main/schema/compose-spec.json

services:
  caddy:
    container_name: caddy
    image: ghcr.io/sholdee/caddy-proxy-cloudflare:v2026.509.80328@sha256:858539a02746c32b951e3099cb0b1773d0e819027388b22fd875047cd3b7d326
    user: 65532:65532
    privileged: false
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /config/caddy:uid=65532,gid=65532
    networks:
      - edge
    depends_on:
      - docker-socket-proxy
    environment:
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
      - CADDY_DOCKER_EVENT_THROTTLE_INTERVAL=3s
    restart: unless-stopped
    volumes:
      - ./data/caddy:/data:rw
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
      - "443:443/udp"

  caddy-config:
    container_name: caddy-config
    image: tianon/true@sha256:068f4cb3e2189f678cb9243477003adc3d1dbe04f789c10f7d6f942f7ad35f7f
    user: 65532:65532
    privileged: false
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    networks:
      - edge
    restart: unless-stopped
    labels:
      caddy.email: "${EMAIL_ADDR}"
      caddy.acme_dns: "cloudflare ${CF_TOKEN}"
      caddy.tls_resolvers: "1.1.1.1 1.0.0.1"
      caddy.servers.trusted_proxies: "static 173.245.48.0/20 103.21.244.0/22 103.22.200.0/22 103.31.4.0/22 141.101.64.0/18 108.162.192.0/18 190.93.240.0/20 188.114.96.0/20 197.234.240.0/22 198.41.128.0/17 162.158.0.0/15 104.16.0.0/13 104.24.0.0/14 172.64.0.0/13 131.0.72.0/22"
      caddy.servers.client_ip_headers: "Cf-Connecting-Ip"
      caddy.log.output: "stdout"
      caddy.persist_config: "off"
      caddy.crowdsec.api_url: "http://crowdsec:8080"
      caddy.crowdsec.appsec_url: "http://crowdsec:7422"
      caddy.crowdsec.api_key: "${CROWDSEC_API_KEY}"

  crowdsec:
    container_name: crowdsec
    image: ghcr.io/crowdsecurity/crowdsec:v1.7.8
    user: 65532:65532
    privileged: false
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    networks:
      - edge
    depends_on:
      - docker-socket-proxy
    environment:
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
      - TZ=${TZ}
      - GID=65532
      - USE_WAL=true
      - COLLECTIONS=crowdsecurity/linux crowdsecurity/caddy crowdsecurity/whitelist-good-actors crowdsecurity/appsec-virtual-patching crowdsecurity/appsec-generic-rules
      - PARSERS=crowdsecurity/whitelists
      - BOUNCER_KEY_CADDY=${CROWDSEC_API_KEY}
    volumes:
      - ./data/crowdsec/data:/var/lib/crowdsec/data:rw
      - ./data/crowdsec/config:/etc/crowdsec:rw
      - ./acquis.yaml:/etc/crowdsec/acquis.yaml:ro
    restart: unless-stopped

  whoami:
    container_name: whoami
    image: docker.io/traefik/whoami:v1.11.0
    user: 65532:65532
    privileged: false
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    networks:
      - edge
    restart: unless-stopped
    labels:
      caddy: "whoami.${DOMAIN}"
      caddy.log:
      caddy.encode: "zstd gzip"
      caddy.route.1_crowdsec:
      caddy.route.2_appsec:
      caddy.route.3_reverse_proxy: "{{upstreams 80}}"
      caddy.route.3_reverse_proxy.header_up: "X-Forwarded-For {client_ip}"

  docker-socket-proxy:
    container_name: docker-socket-proxy
    image: ghcr.io/wollomatic/socket-proxy:1.12.1@sha256:acea4bc53d87e5a2aa56363bac697a91a604c1014bc343786e6b9b76995217a7
    user: 65532:65532
    group_add:
      - "${DOCKER_GID}"
    privileged: false
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /run:uid=65532,gid=65532
      - /tmp:uid=65532,gid=65532,mode=1777
    networks:
      - edge
    command:
      - "-listenip=0.0.0.0"
      - "-allowfrom=caddy,crowdsec"
      - "-allowHEAD=^(/v[0-9.]+)?/_ping$"
      - "-allowGET=^(/v[0-9.]+)?/(info|version|containers/json|containers/[^/]+/json|containers/[^/]+/logs|networks/[^/]+|events)(\\?.*)?$"
      - "-loglevel=INFO"
      - "-watchdoginterval=60"
      - "-stoponwatchdog"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

networks:
  edge:
